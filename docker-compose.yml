services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./.env.development
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    env_file:
      - ./.env.development
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw
      MYSQL_DATABASE: nest-test
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
